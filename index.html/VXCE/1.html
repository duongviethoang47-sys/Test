<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng xoáy chị em  (´｡•᎑•)っ  Chương 1</title>
    <style>
        /* 1. CẤU HÌNH NỀN VÀ SAO (ĐỒNG BỘ TRANG CHỦ) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            color: white;
            background: #050505 url('https://images.unsplash.com/photo-1506318137071-a8e063b4b519?q=80&w=2070') fixed center/cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            z-index: 0; pointer-events: none;
            opacity: 1; filter: brightness(2) contrast(1.5); 
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); filter: brightness(3); }
        }

        /* 2. NAVBAR */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; height: 60px;
            background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 1. CẬP NHẬT LOGO VỚI FONT VÀ HIỆU ỨNG NEON */

        .logo {
            font-family: 'Permanent Marker', cursive; /* Sử dụng font mới */
            font-size: 24px; /* Giữ nguyên kích cỡ cân đối */
            text-decoration: none;
            font-weight: normal;
    
            /* Hiệu ứng loang màu chạy liên tục */
            background: linear-gradient(
            90deg, 
            #00d4ff, #00ff88, #00d4ff, #ff00ff, #00d4ff
            );
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 3s linear infinite;

            /* Bóng đổ Neon xanh cực mạnh */
            filter: drop-shadow(0 0 5px rgba(0, 212, 255, 0.8)) 
            drop-shadow(0 0 15px rgba(0, 212, 255, 0.6))
            drop-shadow(0 0 30px rgba(0, 212, 255, 0.4));
        }

        /* Animation cho màu chạy loang loáng */
        @keyframes gradientFlow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* 2. TĂNG CƯỜNG SAO LẤP LÁNH */
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            z-index: 0; pointer-events: none;
            opacity: 0.8; 
            filter: brightness(2.5) contrast(1.2); 
            animation: intenseTwinkle 2.5s ease-in-out infinite; /* Nhanh hơn và mạnh hơn */
        }

        @keyframes intenseTwinkle {
            0%, 100% { 
                opacity: 0.4; 
                transform: scale(1); 
                filter: brightness(2);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.1); 
                filter: brightness(5) drop-shadow(0 0 10px white); 
            }
        }

        /* 3. NỘI DUNG CHƯƠNG (ẢNH TRUYỆN) */
        .chapter-container {
            position: relative; 
            z-index: 1;
            margin-top: 80px;
            max-width: 800px; /* Độ rộng tối ưu để đọc truyện */
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0; /* Ảnh truyện thường xếp liền nhau */
            line-height: 0;
            font-size: 0;

        }
        .chapter-container img {
            width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: -1px 0 0 0;
            padding: 0;
            border: none;
            outline:none;
            image-rendering: -webkit-optimize-contrast;
            box-shadow: none;
            filter:saturate(125%) contrast(105%) ;
            backface-visibility: hidden;
            transform:translateZ(0);
        }

        /* 4. ĐIỀU HƯỚNG (NAVIGATION) */
        .navigation {
            position: relative; z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 50px 0 100px;
            width: 100%;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            border-radius: 50%;
            color: #00d4ff;
            text-decoration: none;
            font-size: 24px;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .nav-btn:hover {
            background: #00d4ff;
            color: black;
            box-shadow: 0 0 30px #00d4ff;
            transform: scale(1.1);
        }

        /* Nhãn hiển thị phím tắt */
        .nav-hint {
            position: absolute;
            bottom: -30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
        }

        .btn-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tùy chỉnh cho nút bị vô hiệu hóa (nếu không có chương trước) */
        .nav-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: #555;
            color: #555;
        }

        /* 4. ĐIỀU HƯỚNG CHI TIẾT (SCI-FI STYLE) */
        .navigation {
            position: relative; z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
            padding: 80px 0 120px;
            width: 100%;
        }

        .nav-btn {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.5s;
        }

        /* Vòng tròn năng lượng bên ngoài */
        .nav-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 212, 255, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3), inset 0 0 15px rgba(0, 212, 255, 0.3);
            animation: rotateRing 4s linear infinite;
        }

        /* Chấm nhỏ trang trí chạy quanh vòng tròn */
        .nav-btn::after {
            content: '';
            position: absolute;
            width: 115%;
            height: 115%;
            border: 2px dashed rgba(255, 0, 255, 0.4);
            border-radius: 50%;
            animation: rotateRingRev 10s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotateRingRev {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Lõi nút chứa mũi tên */
        .btn-core {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            border: 1px solid rgba(0, 212, 255, 0.8);
            color: #00d4ff;
            font-size: 30px;
            text-shadow: 0 0 10px #00d4ff;
            transition: 0.4s;
        }

        /* Hiệu ứng khi Hover */
        .nav-btn:hover .btn-core {
            box-shadow: 0 0 30px #00d4ff, inset 0 0 20px #00d4ff;
            color: white;
            transform: scale(1.1);
        }

        .nav-btn:hover::before {
            border-color: #00d4ff;
            box-shadow: 0 0 40px #00d4ff;
        }

        /* Nhãn chữ TRƯỚC / TIẾP */
        .btn-label {
            position: absolute;
            bottom: -35px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #00d4ff;
            text-transform: uppercase;
            text-shadow: 0 0 5px #00d4ff;
        }

        /* Phím tắt hỗ trợ bên dưới */
        .nav-hint {
            position: absolute;
            bottom: -60px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Nút màu tím cho "Tiếp theo" */
        #nextBtn::before { border-color: rgba(255, 0, 255, 0.5); box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); }
        #nextBtn .btn-core { border-color: #ff00ff; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        #nextBtn:hover .btn-core { box-shadow: 0 0 30px #ff00ff, inset 0 0 20px #ff00ff; }
        #nextBtn .btn-label { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }

        /* Vô hiệu hóa nút */
        .nav-btn.disabled {
            filter: grayscale(1);
            opacity: 0.2;
            pointer-events: none;
        }

        /* DROPDOWN CONTAINER */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* NÚT CHỌN CHƯƠNG */
        .dropbtn {
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            padding: 8px 16px;
            font-size: 14px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .dropbtn:hover {
            border-color: #00d4ff;
            color: white;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .arrow-down {
            font-size: 10px;
            margin-left: 5px;
            color: #00d4ff;
        }

        /* NỘI DUNG DANH SÁCH THẢ XUỐNG */
        .dropdown-content {
            display: none; /* Ẩn mặc định */
            position: absolute;
            right: 0;
            top: 45px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(15px);
            min-width: 250px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            z-index: 2000;
            overflow: hidden;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-content a {
            color: #aaa;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .dropdown-content a:hover {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding-left: 20px;
        }

        .dropdown-content a.active {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
            font-weight: bold;
        }

        /* Hiển thị khi có class 'show' */
        .show { display: block; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stars-overlay"></div>

    <header class="navbar">
        <a href="index.html" class="logo">BYAS</a>
        <div class="dropdown">
        <button class="dropbtn" onclick="toggleDropdown()">
            Chương 1 <span class="arrow-down">▼</span>
        </button>
        <div id="chapterDropdown" class="dropdown-content">
            <a href="1.html" class="active">Chương 1</a>
            <a href="2.html">Chương 2</a>
            <a href="3.html">Chương 3</a>
            <a href="4.html">Chương 4</a>
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 5px 0;">
            <a href="VXCE.html" style="color: #00d4ff;">⇜ Vòng xoáy chị em</a>
        </div>
    </div>
    </header>

    <div class="chapter-container">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/003.jpg" alt="Page 1">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/004.jpg" alt="Page 2">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/005.jpg" alt="Page 3">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/006.jpg" alt="Page 4">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/007.jpg" alt="Page 5">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/009.jpg" alt="Page 6">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/010.jpg" alt="Page 7">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/011.jpg" alt="Page 8">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/012.jpg" alt="Page 9">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/013.jpg" alt="Page 10">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/014.jpg" alt="Page 11">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/015.jpg" alt="Page 12">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/016.jpg" alt="Page 13">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/017.jpg" alt="Page 14">
        <img src="https://img.pixelimg.net/vong-xoay-chi-em/chapter-1/018.jpg" alt="Page 15">

    </div>

    <div class="navigation">
        <div class="btn-wrapper">
            <a href="index.html" class="nav-btn disabled" id="prevBtn">
                <div class="btn-core">⇜</div>
                <div class="btn-label"></div>
            </a>
            <span class="nav-hint"></span>
        </div>

        <div class="btn-wrapper">
            <a href="2.html" class="nav-btn" id="nextBtn">
                <div class="btn-core">⇝</div>
                <div class="btn-label"></div>
            </a>
            <span class="nav-hint"></span>
        </div>
    </div>

    <script>
        // 1. CHỨC NĂNG PHÍM MŨI TÊN
        document.addEventListener('keydown', function(event) {
            if (event.key === "ArrowLeft") {
                // Nhấn mũi tên trái -> Quay lại (nếu không bị disabled)
                const prevLink = document.getElementById('prevBtn').getAttribute('href');
                if (!document.getElementById('prevBtn').classList.contains('disabled')) {
                    window.location.href = prevLink;
                }
            } else if (event.key === "ArrowRight") {
                // Nhấn mũi tên phải -> Chương kế tiếp
                const nextLink = document.getElementById('nextBtn').getAttribute('href');
                if (!document.getElementById('nextBtn').classList.contains('disabled')) {
                    window.location.href = nextLink;
                }
            }
        });

        // 2. HIỆU ỨNG PARALLAX SAO (ĐỒNG BỘ)
        window.addEventListener('scroll', function() {
            const scrollValue = window.scrollY;
            document.body.style.backgroundPositionY = (scrollValue * 0.3) + 'px';
            const stars = document.querySelector('.stars-overlay');
            if(stars) {
                stars.style.transform = `translateY(${scrollValue * -0.1}px)`;
            }
        });

        /* Hàm đóng mở Dropdown */
        function toggleDropdown() {
            document.getElementById("chapterDropdown").classList.toggle("show");
        }

        /* Đóng menu nếu người dùng click ra ngoài vùng menu */
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
