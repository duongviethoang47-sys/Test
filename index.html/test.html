<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYAS - Universe Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        /* 1. ĐỊNH DẠNG CHUNG */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: white;
            background-color: #050505; 
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4b519?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* 2. HIỆU ỨNG SAO LẤP LÁNH MẠNH (GIỐNG CODE ĐẦU) */
        .stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            z-index: 0;
            pointer-events: none;
            opacity: 1;
            filter: brightness(2) contrast(1.5); 
            animation: twinkle 2.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; transform: scale(1); filter: brightness(2); }
            50% { opacity: 1; transform: scale(1.05); filter: brightness(3.5) contrast(1.2); }
        }

        /* 3. HEADER & NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 95px; /* Tăng chiều cao để chứa logo to */
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        /* 4. LOGO BYAS SIÊU TO & RỰC RỠ */
        .logo {
            font-family: 'Permanent Marker', cursive; 
            font-size: 52px; /* Kích thước cực đại */
            font-weight: 900;
            letter-spacing: 4px;
            text-decoration: none;
            text-transform: uppercase;

            /* Hiệu ứng loang màu chạy liên tục */
            background: linear-gradient(45deg, #00d4ff, #00ff88, #ff00ff, #00d4ff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoGradient 3s linear infinite;
            
            /* Đổ bóng Neon rực rỡ */
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .logo:hover {
            filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8));
            transform: scale(1.1) rotate(-2deg);
        }

        @keyframes logoGradient {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* 5. NÚT MENU */
        .menu-btn {
            cursor: pointer;
            z-index: 3000;
            padding: 10px;
        }

        .menu-btn span {
            display: block;
            width: 30px;
            height: 3px;
            background: white;
            margin: 6px 0;
            transition: 0.4s;
        }

        .open .bar1 { transform: rotate(-45deg) translate(-7px, 7px); }
        .open .bar2 { opacity: 0; }
        .open .bar3 { transform: rotate(45deg) translate(-6px, -7px); }

        /* 6. MENU OVERLAY & CONTENT */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

        .overlay.active { opacity: 1; visibility: visible; }

        .menu-wrapper {
            width: 320px;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .menu-content {
            position: absolute;
            top: 0; right: 0;
            width: 100%; height: 100%;
            background: white;
            padding: 120px 0 30px 0;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .overlay.active #mainMenu { transform: translateX(0); }
        #mainMenu.slide-out { transform: translateX(-100%); }
        #subMenu.sub-active { transform: translateX(0); }

        .menu-content a {
            display: block;
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            border-bottom: 1px solid #eee;
            transition: 0.3s;
        }

        .menu-content a:hover { color: #00d4ff; padding-left: 40px; background: #f9f9f9; }

        .sub-header { padding: 0 30px 20px; border-bottom: 1px solid #ddd; }
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .name-list { flex: 1; overflow-y: auto; padding: 10px 0; }

        /* 7. NỘI DUNG CHÍNH & GALLERY */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 150px 20px 50px; /* Chừa khoảng trống cho Logo to */
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: white;
            text-align: center;
        }

        .gallery img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: 0.4s ease;
            image-rendering: -webkit-optimize-contrast;
            filter:saturate(115%) contrast(105%);
        }

        .gallery-item:hover img {
            transform: translateY(-10px) scale(1.03);
            border-color: #00d4ff;
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
            filter:saturate(140%) contrast(110%);
        }

        .caption {
            margin-top: 15px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 8. RESPONSIVE */
        @media (max-width: 1024px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { 
            .gallery { grid-template-columns: 1fr; } 
            .logo { font-size: 36px; }
            .navbar { height: 75px; }
            .container { padding-top: 110px; }
        }

        /* CSS MÀN HÌNH KHÓA */
        .lock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(20px);
            z-index: 9999; /* Luôn nằm trên cùng */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lock-box {
            background: rgba(20, 20, 20, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #00d4ff;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            max-width: 400px;
            width: 90%;
        }

        .lock-title {
            font-family: 'Permanent Marker', cursive;
            font-size: 32px;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            margin-bottom: 10px;
        }

        #passwordInput {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }

        #passwordInput:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .lock-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-access, .btn-exit {
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-access {
            background: #00d4ff;
            border: none;
            color: black;
        }

        .btn-access:hover { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
    
        .btn-exit {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .btn-exit:hover { background: #ff4444; color: white; }

        .error-msg {
            color: #ff4444;
            font-size: 12px;
            margin-top: 15px;
            display: none; /* Ẩn mặc định */
        }
    </style>
</head>
<body>
    <div id="lockScreen" class="lock-overlay">
        <div class="lock-box">        
            <h2 class="lock-title">BYAS (´｡•᎑•)っ</h2>
            <p style="margin-bottom: 20px; color: #00d4ff; font-size: 14px;">Vui lòng nhập mã truy cập để tiếp tục</p>
        
            <input type="password" id="passwordInput" placeholder="Nhập mật khẩu..." autofocus>
        
            <div class="lock-btns">
                <button onclick="checkPassword()" class="btn-access">TRUY CẬP</button>
                <a href="Trangchu.html" class="btn-exit">QUAY LẠI</a> </div>

            <p id="errorMessage" class="error-msg">Mật khẩu không chính xác!</p>
        </div>
    </div>

    <div class="stars-overlay"></div>

    <header class="navbar">
        <a href="Trangchu.html" class="logo">BYAS</a>
        <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <span class="bar1"></span>
            <span class="bar2"></span>
            <span class="bar3"></span>
        </div>
    </header>

    <div id="menuOverlay" class="overlay" onclick="closeOutside(event)">
        <div class="menu-wrapper">
            <div class="menu-content" id="mainMenu">
                <nav>
                    <a href="Trangchu.html">Trang chủ</a>
                    <a href="Matnao.html">Mất não</a>
                    <a href="KMau.html">Không màu</a>
                    <a href="Hat.html">HManhwa</a>
                    <a href="javascript:void(0)" onclick="openSubMenu()" style="color: #00d4ff; font-weight: bold;">🔍 Danh sách A-Z</a>
                </nav>
            </div>

            <div class="menu-content" id="subMenu">
                <div class="sub-header">
                    <button onclick="closeSubMenu()" class="back-btn">⇜ Quay lại</button>
                    <h3 style="color: #333;">Danh sách truyện</h3>
                </div>
                <div class="name-list" id="autoNameList"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="gallery">
            <a href="VXCE/VXCE.html" class="gallery-item">
                <img src="https://truyenvn.shop/wp-content/uploads/2025/08/truyen-vong-xoay-chi-em-2.jpg">
                <p class="caption">Vòng xoáy chị em</p>
            </a>
            <a href="#" class="gallery-item">
                <img src="https://i0.wp.com/s2.anhvip.xyz/comics/ta-troi-sinh-da-la-nhan-vat-phan-dien-1764929303.webp">
                <p class="caption">Ta trời sinh đã là nhân vật phản diện</p>
            </a>
            <a href="#" class="gallery-item">
                <img src="https://i0.wp.com/s2.anhvip.xyz/comics/nhiem-vu-doi-that-1636022368.jpg">
                <p class="caption">Nhiệm vụ đời thật</p>
            </a>
            <a href="#" class="gallery-item">
                <img src="https://i0.wp.com/s2.anhvip.xyz/comics/vo-luyen-dinh-phong-1745757256.jpg">
                <p class="caption">Hư thận đại đế</p>
            </a>
        </div>
    </div>

    <script>
        // Điều khiển Menu
        function toggleMenu() {
            const btn = document.getElementById("menuBtn");
            const overlay = document.getElementById("menuOverlay");
            btn.classList.toggle("open");
            overlay.classList.toggle("active");
            if (!overlay.classList.contains("active")) {
                setTimeout(closeSubMenu, 300);
            }
        }

        function openSubMenu() {
            const listContainer = document.getElementById('autoNameList');
            const captions = document.querySelectorAll('.caption');
            let names = [];
            captions.forEach(cap => names.push(cap.innerText.trim()));
            names.sort((a, b) => a.localeCompare(b, 'vi'));

            listContainer.innerHTML = "";
            names.forEach(name => {
                const a = document.createElement('a');
                a.href = "javascript:void(0)";
                a.innerText = name;
                a.onclick = () => toggleMenu();
                listContainer.appendChild(a);
            });

            document.getElementById("mainMenu").classList.add("slide-out");
            document.getElementById("subMenu").classList.add("sub-active");
        }

        function closeSubMenu() {
            document.getElementById("mainMenu").classList.remove("slide-out");
            document.getElementById("subMenu").classList.remove("sub-active");
        }

        function closeOutside(e) {
            if (e.target.id === "menuOverlay") toggleMenu();
        }

        // Hiệu ứng Parallax khi cuộn trang
        window.addEventListener('scroll', function() {
            const scrollValue = window.scrollY;
            document.body.style.backgroundPositionY = (scrollValue * 0.2) + 'px';
            const stars = document.querySelector('.stars-overlay');
            if(stars) {
                stars.style.transform = `translateY(${scrollValue * -0.1}px)`;
            }
        });

        const CORRECT_PASSWORD = "4704"; // ĐỔI MẬT KHẨU CỦA BẠN TẠI ĐÂY

        function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            const error = document.getElementById("errorMessage");
            const lockScreen = document.getElementById("lockScreen");

            if (input === CORRECT_PASSWORD) {
                // Nếu đúng: Ẩn màn hình khóa và lưu vào bộ nhớ tạm để không phải nhập lại khi tải lại trang
                lockScreen.style.display = "none";
                sessionStorage.setItem("isAllowed", "true");
            } else {
                // Nếu sai: Hiện thông báo lỗi và rung nhẹ ô nhập (nếu muốn)
                error.style.display = "block";
                document.getElementById("passwordInput").value = "";
            }
        }

        // Kiểm tra nếu người dùng đã nhập đúng trước đó (trong cùng một phiên làm việc)
        window.onload = function() {
            if (sessionStorage.getItem("isAllowed") === "true") {
                document.getElementById("lockScreen").style.display = "none";
            }
        };

        // Cho phép nhấn phím Enter để gửi mật khẩu
        document.getElementById("passwordInput")?.addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkPassword();
        });
    </script>
</body>
</html>
